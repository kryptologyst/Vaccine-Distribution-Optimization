name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install black ruff pytest
    
    - name: Run black
      run: black --check src/ scripts/ demo/ tests/
    
    - name: Run ruff
      run: ruff check src/ scripts/ demo/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
    
    - name: Run tests
      run: |
        pytest tests/ -v --cov=src --cov-report=xml
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  demo-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Test demo imports
      run: |
        python -c "
        import sys
        sys.path.append('src')
        from vaccine_distribution.data import VaccineDataGenerator
        from vaccine_distribution.models import BaselineRegressor
        from vaccine_distribution.evaluation import VaccineEvaluator
        print('All imports successful')
        "
    
    - name: Test basic functionality
      run: |
        python -c "
        import sys
        sys.path.append('src')
        from vaccine_distribution.data import VaccineDataGenerator, VaccineDataProcessor
        from vaccine_distribution.models import BaselineRegressor
        
        # Generate small dataset
        generator = VaccineDataGenerator(seed=42)
        regions = generator.generate_regions(n_regions=10)
        
        # Process data
        processor = VaccineDataProcessor()
        df = processor.regions_to_dataframe(regions)
        X, y = processor.prepare_features(df)
        
        # Train simple model
        model = BaselineRegressor('linear')
        model.fit(X, y)
        predictions = model.predict(X)
        
        print(f'Generated {len(regions)} regions')
        print(f'Model trained successfully, predictions shape: {predictions.shape}')
        "

  build:
    runs-on: ubuntu-latest
    needs: [lint, test, demo-test]
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine
    
    - name: Build package
      run: python -m build
    
    - name: Check package
      run: twine check dist/*
